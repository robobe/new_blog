<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">FPV frame geometry examples</title>
  <desc id="desc">Examples of common FPV quadcopter frame geometries: True X, Stretch X, Squished X, Deadcat, H frame, and Plus.</desc>
  <defs>
    <style>
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .body { fill: #e2e8f0; stroke: #0f172a; stroke-width: 3; }
      .arm { stroke: #334155; stroke-width: 8; stroke-linecap: round; }
      .motor { fill: #f97316; stroke: #9a3412; stroke-width: 3; }
      .label { font: 700 24px Arial, sans-serif; fill: #111827; }
      .small { font: 17px Arial, sans-serif; fill: #475569; }
      .axis { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <g transform="translate(40 40)">
    <rect width="310" height="200" rx="10" class="panel"/>
    <text x="155" y="34" text-anchor="middle" class="label">True X</text>
    <path d="M155 105 L90 55 M155 105 L220 55 M155 105 L90 155 M155 105 L220 155" class="arm"/>
    <rect x="130" y="80" width="50" height="50" rx="8" class="body"/>
    <circle cx="90" cy="55" r="15" class="motor"/>
    <circle cx="220" cy="55" r="15" class="motor"/>
    <circle cx="90" cy="155" r="15" class="motor"/>
    <circle cx="220" cy="155" r="15" class="motor"/>
    <text x="155" y="188" text-anchor="middle" class="small">balanced roll and pitch</text>
  </g>

  <g transform="translate(395 40)">
    <rect width="310" height="200" rx="10" class="panel"/>
    <text x="155" y="34" text-anchor="middle" class="label">Stretch X</text>
    <path d="M155 105 L110 35 M155 105 L200 35 M155 105 L110 175 M155 105 L200 175" class="arm"/>
    <rect x="130" y="80" width="50" height="50" rx="8" class="body"/>
    <circle cx="110" cy="35" r="15" class="motor"/>
    <circle cx="200" cy="35" r="15" class="motor"/>
    <circle cx="110" cy="175" r="15" class="motor"/>
    <circle cx="200" cy="175" r="15" class="motor"/>
    <text x="155" y="188" text-anchor="middle" class="small">more front-back spacing</text>
  </g>

  <g transform="translate(750 40)">
    <rect width="310" height="200" rx="10" class="panel"/>
    <text x="155" y="34" text-anchor="middle" class="label">Squished X</text>
    <path d="M155 105 L75 65 M155 105 L235 65 M155 105 L75 145 M155 105 L235 145" class="arm"/>
    <rect x="130" y="80" width="50" height="50" rx="8" class="body"/>
    <circle cx="75" cy="65" r="15" class="motor"/>
    <circle cx="235" cy="65" r="15" class="motor"/>
    <circle cx="75" cy="145" r="15" class="motor"/>
    <circle cx="235" cy="145" r="15" class="motor"/>
    <text x="155" y="188" text-anchor="middle" class="small">more side-side spacing</text>
  </g>

  <g transform="translate(40 280)">
    <rect width="310" height="200" rx="10" class="panel"/>
    <text x="155" y="34" text-anchor="middle" class="label">Deadcat</text>
    <path d="M155 105 L45 70 M155 105 L265 70 M155 105 L105 160 M155 105 L205 160" class="arm"/>
    <rect x="130" y="80" width="50" height="50" rx="8" class="body"/>
    <circle cx="45" cy="70" r="15" class="motor"/>
    <circle cx="265" cy="70" r="15" class="motor"/>
    <circle cx="105" cy="160" r="15" class="motor"/>
    <circle cx="205" cy="160" r="15" class="motor"/>
    <text x="155" y="188" text-anchor="middle" class="small">front props out of camera view</text>
  </g>

  <g transform="translate(395 280)">
    <rect width="310" height="200" rx="10" class="panel"/>
    <text x="155" y="34" text-anchor="middle" class="label">H Frame</text>
    <path d="M85 60 L85 155 M225 60 L225 155 M85 105 L225 105" class="arm"/>
    <rect x="120" y="72" width="70" height="66" rx="8" class="body"/>
    <circle cx="85" cy="60" r="15" class="motor"/>
    <circle cx="225" cy="60" r="15" class="motor"/>
    <circle cx="85" cy="155" r="15" class="motor"/>
    <circle cx="225" cy="155" r="15" class="motor"/>
    <text x="155" y="188" text-anchor="middle" class="small">long body, more payload room</text>
  </g>

  <g transform="translate(750 280)">
    <rect width="310" height="200" rx="10" class="panel"/>
    <text x="155" y="34" text-anchor="middle" class="label">Plus</text>
    <path d="M155 105 L155 40 M155 105 L220 105 M155 105 L155 170 M155 105 L90 105" class="arm"/>
    <rect x="130" y="80" width="50" height="50" rx="8" class="body"/>
    <circle cx="155" cy="40" r="15" class="motor"/>
    <circle cx="220" cy="105" r="15" class="motor"/>
    <circle cx="155" cy="170" r="15" class="motor"/>
    <circle cx="90" cy="105" r="15" class="motor"/>
    <text x="155" y="188" text-anchor="middle" class="small">one motor points forward</text>
  </g>

  <text x="550" y="560" text-anchor="middle" class="label">Geometry is not the same as Betaflight mixer name</text>
  <text x="550" y="594" text-anchor="middle" class="small">Most 4-motor FPV frames use the Betaflight QUADX mixer even if the physical frame is True X, Stretch X, Squished X, or Deadcat.</text>
  <text x="550" y="626" text-anchor="middle" class="small">Use custom motor mixing only when motor positions are unusual enough that a standard mixer does not match the frame.</text>
</svg>
