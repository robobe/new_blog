<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">TFmini time of flight principle</title>
  <desc id="desc">A TFmini LiDAR sends infrared light to a target and measures the returned light to estimate distance.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-return" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 3; }
      .lens { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; }
      .target { fill: #fee2e2; stroke: #dc2626; stroke-width: 3; }
      .label { font: 700 24px sans-serif; fill: #111827; }
      .small { font: 18px sans-serif; fill: #334155; }
      .send { stroke: #2563eb; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .return { stroke: #16a34a; stroke-width: 5; fill: none; marker-end: url(#arrow-return); stroke-dasharray: 12 10; }
    </style>
  </defs>

  <rect x="70" y="95" width="210" height="170" rx="18" class="box"/>
  <circle cx="135" cy="180" r="34" class="lens"/>
  <circle cx="215" cy="180" r="34" class="lens"/>
  <text x="175" y="135" text-anchor="middle" class="label">TFmini</text>
  <text x="135" y="230" text-anchor="middle" class="small">TX</text>
  <text x="215" y="230" text-anchor="middle" class="small">RX</text>

  <rect x="700" y="75" width="70" height="230" rx="8" class="target"/>
  <text x="735" y="55" text-anchor="middle" class="label">Target</text>

  <path d="M135 155 C310 75, 520 75, 700 145" class="send"/>
  <path d="M700 215 C520 285, 310 285, 215 205" class="return"/>

  <text x="430" y="78" text-anchor="middle" class="small">near infrared light</text>
  <text x="430" y="310" text-anchor="middle" class="small">reflected light</text>
  <text x="450" y="185" text-anchor="middle" class="label">distance from time of flight</text>
</svg>
