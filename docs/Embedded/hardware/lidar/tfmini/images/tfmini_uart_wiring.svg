<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">TFmini UART wiring with wire colors</title>
  <desc id="desc">TFmini UART wiring to a 3.3 volt UART host. The sensor is powered from 5 volts, while UART logic must be 3.3 volts.</desc>
  <defs>
    <style>
      .sensor { fill: #f8fafc; stroke: #1f2937; stroke-width: 3; }
      .host { fill: #ecfdf5; stroke: #166534; stroke-width: 3; }
      .level { fill: #fffbeb; stroke: #d97706; stroke-width: 3; stroke-dasharray: 10 8; }
      .pin { font: 700 19px sans-serif; fill: #111827; }
      .label { font: 700 27px sans-serif; fill: #111827; }
      .small { font: 18px sans-serif; fill: #334155; }
      .warn { font: 700 18px sans-serif; fill: #b91c1c; }
      .wire { fill: none; stroke-width: 8; stroke-linecap: round; }
      .red { stroke: #dc2626; }
      .black { stroke: #111827; }
      .green { stroke: #16a34a; }
      .white { stroke: #cbd5e1; }
      .orange { stroke: #f97316; }
      .wire-label { font: 700 18px sans-serif; fill: #111827; paint-order: stroke; stroke: white; stroke-width: 5; }
    </style>
  </defs>

  <rect x="70" y="75" width="300" height="330" rx="16" class="sensor"/>
  <text x="220" y="120" text-anchor="middle" class="label">TFmini UART</text>
  <text x="220" y="150" text-anchor="middle" class="small">Power: 5 V</text>
  <text x="220" y="177" text-anchor="middle" class="small">UART logic: 3.3 V LVTTL</text>

  <text x="105" y="230" class="pin">Green: TXD output</text>
  <text x="105" y="275" class="pin">White: RXD input</text>
  <text x="105" y="320" class="pin">Red: +5 V</text>
  <text x="105" y="365" class="pin">Black: GND</text>

  <rect x="455" y="92" width="210" height="125" rx="14" class="level"/>
  <text x="560" y="132" text-anchor="middle" class="label">optional</text>
  <text x="560" y="162" text-anchor="middle" class="small">level shifter</text>
  <text x="560" y="190" text-anchor="middle" class="small">needed for 5 V UART TX</text>

  <rect x="765" y="75" width="300" height="330" rx="16" class="host"/>
  <text x="915" y="120" text-anchor="middle" class="label">UART Host</text>
  <text x="915" y="150" text-anchor="middle" class="small">USB-TTL / MCU / FC / RPi</text>
  <text x="915" y="177" text-anchor="middle" class="small">UART logic must be 3.3 V</text>

  <text x="800" y="230" class="pin">RXD 3.3 V input</text>
  <text x="800" y="275" class="pin">TXD 3.3 V output</text>
  <text x="800" y="320" class="pin">5 V power output</text>
  <text x="800" y="365" class="pin">GND</text>

  <path d="M370 225 C505 215, 630 215, 765 225" class="wire green"/>
  <path d="M370 270 C430 258, 445 258, 455 258" class="wire white"/>
  <path d="M665 258 C695 258, 725 264, 765 270" class="wire orange"/>
  <path d="M370 315 C505 315, 630 315, 765 315" class="wire red"/>
  <path d="M370 360 C505 385, 630 385, 765 360" class="wire black"/>

  <text x="565" y="213" text-anchor="middle" class="wire-label">Green TXD -> host RXD</text>
  <text x="415" y="250" text-anchor="middle" class="wire-label">White RXD</text>
  <text x="715" y="250" text-anchor="middle" class="wire-label">host TXD -> RXD</text>
  <text x="565" y="305" text-anchor="middle" class="wire-label">Red +5 V</text>
  <text x="565" y="405" text-anchor="middle" class="wire-label">Black GND</text>

  <text x="560" y="462" text-anchor="middle" class="warn">Power is 5 V, but UART signaling is 3.3 V. 5 V TTL can damage the sensor UART input.</text>
  <text x="560" y="492" text-anchor="middle" class="small">For read-only use, connect green TXD to host RXD, red to 5 V, black to GND, and leave white RXD disconnected.</text>
</svg>
