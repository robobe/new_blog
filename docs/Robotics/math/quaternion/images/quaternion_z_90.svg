<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">Before and after quaternion rotation of 90 degrees around Z</title>
  <desc id="desc">Two side by side 3D coordinate drawings. Before rotation the vector points along X. After rotation the vector points along Y.</desc>
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
      .title { font-size: 22px; font-weight: 700; }
      .panel-title { font-size: 20px; font-weight: 700; }
      .label { font-size: 16px; font-weight: 700; }
      .small { font-size: 15px; }
      .axis { stroke-width: 4; stroke-linecap: round; }
      .vector { stroke-width: 7; stroke-linecap: round; }
      .grid { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.5; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; }
      .arc { fill: none; stroke: #f59e0b; stroke-width: 5; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="1" y="1" width="918" height="428" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="32" y="42" class="title">Quaternion rotation: 90 deg around Z</text>

  <rect x="32" y="72" width="405" height="320" rx="8" class="panel"/>
  <rect x="483" y="72" width="405" height="320" rx="8" class="panel"/>

  <text x="62" y="112" class="panel-title">Before rotation</text>
  <text x="513" y="112" class="panel-title">After rotation</text>

  <g transform="translate(230 260)">
    <polygon points="-125,58 25,-22 158,38 8,118" class="grid"/>
    <line x1="-100" y1="45" x2="130" y2="45" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="-62" y1="25" x2="168" y2="25" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="-25" y1="5" x2="205" y2="5" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="-87" y1="78" x2="63" y2="-2" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="-27" y1="101" x2="123" y2="21" stroke="#e5e7eb" stroke-width="1"/>

    <line x1="0" y1="0" x2="135" y2="58" class="axis" stroke="#dc2626" marker-end="url(#arrow-red)"/>
    <line x1="0" y1="0" x2="120" y2="-64" class="axis" stroke="#16a34a" marker-end="url(#arrow-green)"/>
    <line x1="0" y1="0" x2="0" y2="-145" class="axis" stroke="#2563eb" marker-end="url(#arrow-blue)"/>

    <line x1="0" y1="0" x2="105" y2="45" class="vector" stroke="#f59e0b" marker-end="url(#arrow-orange)"/>
    <circle cx="0" cy="0" r="6" fill="#111827"/>

    <text x="145" y="70" class="label">+X</text>
    <text x="126" y="-66" class="label">+Y</text>
    <text x="10" y="-150" class="label">+Z</text>
    <text x="60" y="27" class="small">v = (1, 0, 0)</text>
  </g>

  <g transform="translate(681 260)">
    <polygon points="-125,58 25,-22 158,38 8,118" class="grid"/>
    <line x1="-100" y1="45" x2="130" y2="45" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="-62" y1="25" x2="168" y2="25" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="-25" y1="5" x2="205" y2="5" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="-87" y1="78" x2="63" y2="-2" stroke="#e5e7eb" stroke-width="1"/>
    <line x1="-27" y1="101" x2="123" y2="21" stroke="#e5e7eb" stroke-width="1"/>

    <line x1="0" y1="0" x2="135" y2="58" class="axis" stroke="#dc2626" marker-end="url(#arrow-red)"/>
    <line x1="0" y1="0" x2="120" y2="-64" class="axis" stroke="#16a34a" marker-end="url(#arrow-green)"/>
    <line x1="0" y1="0" x2="0" y2="-145" class="axis" stroke="#2563eb" marker-end="url(#arrow-blue)"/>

    <line x1="0" y1="0" x2="94" y2="-50" class="vector" stroke="#f59e0b" marker-end="url(#arrow-orange)"/>
    <path d="M 76 32 C 123 18 118 -22 82 -44" class="arc" marker-end="url(#arrow-orange)"/>
    <circle cx="0" cy="0" r="6" fill="#111827"/>

    <text x="145" y="70" class="label">+X</text>
    <text x="126" y="-66" class="label">+Y</text>
    <text x="10" y="-150" class="label">+Z</text>
    <text x="82" y="-76" class="small">v' = (0, 1, 0)</text>
    <text x="-22" y="-34" class="small">90 deg</text>
  </g>

  <text x="132" y="370" class="small">Vector starts on the X axis</text>
  <text x="562" y="370" class="small">After q v q^-1, it points on the Y axis</text>
</svg>
