<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">FPV brushless motor parts</title>
  <desc id="desc">Simple labeled drawing of FPV brushless motor parts: shaft, bell, magnets, stator, windings, bearing, base, mounting holes, and motor wires.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
    <style>
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .bell { fill: #cbd5e1; stroke: #334155; stroke-width: 4; }
      .bell-cut { fill: #f8fafc; stroke: #334155; stroke-width: 3; }
      .magnet { fill: #93c5fd; stroke: #2563eb; stroke-width: 2; }
      .stator { fill: #f97316; stroke: #9a3412; stroke-width: 3; }
      .winding { fill: none; stroke: #fed7aa; stroke-width: 8; stroke-linecap: round; }
      .shaft { fill: #111827; }
      .bearing { fill: #ffffff; stroke: #334155; stroke-width: 3; }
      .base { fill: #64748b; stroke: #334155; stroke-width: 3; }
      .wire-red { stroke: #dc2626; stroke-width: 8; fill: none; stroke-linecap: round; }
      .wire-yellow { stroke: #eab308; stroke-width: 8; fill: none; stroke-linecap: round; }
      .wire-black { stroke: #111827; stroke-width: 8; fill: none; stroke-linecap: round; }
      .callout { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .label { fill: #111827; font: 700 30px Arial, sans-serif; }
      .small { fill: #334155; font: 18px Arial, sans-serif; }
      .tag { fill: #111827; font: 700 19px Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>
  <rect x="45" y="45" width="1110" height="520" rx="12" class="panel"/>
  <text x="85" y="95" class="label">FPV Brushless Motor Parts</text>
  <text x="85" y="125" class="small">Simplified cutaway view of an outrunner motor</text>

  <!-- Motor drawing -->
  <g transform="translate(0,0)">
    <!-- wires behind base -->
    <path d="M560 450 C575 500 610 525 660 545" class="wire-red"/>
    <path d="M590 450 C615 492 655 510 705 535" class="wire-yellow"/>
    <path d="M620 448 C655 482 700 492 755 515" class="wire-black"/>

    <!-- base and mount -->
    <rect x="425" y="420" width="310" height="58" rx="16" class="base"/>
    <circle cx="470" cy="449" r="10" fill="#f8fafc" stroke="#334155" stroke-width="3"/>
    <circle cx="690" cy="449" r="10" fill="#f8fafc" stroke="#334155" stroke-width="3"/>

    <!-- bell/can -->
    <path d="M370 195 C370 140 410 120 580 120 C750 120 790 140 790 195 L790 390 C790 420 760 438 580 438 C400 438 370 420 370 390 Z" class="bell"/>
    <path d="M430 205 C430 170 470 158 580 158 C690 158 730 170 730 205 L730 380 C730 400 700 410 580 410 C460 410 430 400 430 380 Z" class="bell-cut"/>

    <!-- magnets -->
    <rect x="395" y="222" width="35" height="118" rx="8" class="magnet"/>
    <rect x="730" y="222" width="35" height="118" rx="8" class="magnet"/>
    <rect x="500" y="158" width="56" height="28" rx="8" class="magnet"/>
    <rect x="604" y="158" width="56" height="28" rx="8" class="magnet"/>

    <!-- stator and winding -->
    <rect x="495" y="238" width="170" height="118" rx="18" class="stator"/>
    <path d="M515 260 H645" class="winding"/>
    <path d="M515 296 H645" class="winding"/>
    <path d="M515 332 H645" class="winding"/>

    <!-- shaft and bearing -->
    <rect x="562" y="70" width="36" height="210" rx="12" class="shaft"/>
    <circle cx="580" cy="238" r="34" class="bearing"/>
    <circle cx="580" cy="238" r="11" class="shaft"/>
  </g>

  <!-- Callouts left -->
  <text x="100" y="190" class="tag">Shaft</text>
  <path d="M170 184 L560 110" class="callout"/>

  <text x="100" y="260" class="tag">Motor bell</text>
  <path d="M220 254 L390 205" class="callout"/>

  <text x="100" y="330" class="tag">Magnets</text>
  <path d="M205 324 L397 265" class="callout"/>

  <text x="100" y="400" class="tag">Mounting base</text>
  <path d="M245 394 L455 440" class="callout"/>

  <!-- Callouts right -->
  <text x="880" y="205" class="tag">Bearing</text>
  <path d="M875 200 L612 238" class="callout"/>

  <text x="880" y="275" class="tag">Stator</text>
  <path d="M865 268 L665 292" class="callout"/>

  <text x="880" y="345" class="tag">Copper windings</text>
  <path d="M865 338 L650 330" class="callout"/>

  <text x="880" y="455" class="tag">3 motor wires</text>
  <path d="M870 448 L705 535" class="callout"/>

  <text x="100" y="525" class="small">The bell, shaft, and magnets rotate. The stator and windings stay fixed to the base.</text>
</svg>
