<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">FPV motor stator diameter and height measurement</title>
  <desc id="desc">Diagram explaining FPV motor numbering. A 2207 motor has a stator diameter of 22 millimeters and a stator height of 7 millimeters. The drawing shows top view diameter and side view height.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
    <marker id="arrow-start" markerWidth="12" markerHeight="12" refX="2" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M10,2 L2,6 L10,10 Z" fill="#111827"/>
    </marker>
    <style>
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .motor-can { fill: #e2e8f0; stroke: #334155; stroke-width: 3; }
      .stator { fill: #f97316; stroke: #9a3412; stroke-width: 3; }
      .copper { fill: none; stroke: #fed7aa; stroke-width: 7; stroke-linecap: round; }
      .shaft { fill: #111827; }
      .bearing { fill: #ffffff; stroke: #334155; stroke-width: 3; }
      .dim { stroke: #111827; stroke-width: 4; marker-start: url(#arrow-start); marker-end: url(#arrow); }
      .guide { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 7; }
      .label { fill: #111827; font: 700 30px Arial, sans-serif; }
      .sub { fill: #334155; font: 20px Arial, sans-serif; }
      .small { fill: #334155; font: 18px Arial, sans-serif; }
      .tiny { fill: #475569; font: 15px Arial, sans-serif; }
      .orange { fill: #ea580c; font: 700 22px Arial, sans-serif; }
      .blue { fill: #2563eb; font: 700 22px Arial, sans-serif; }
      .note { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>
  <rect x="45" y="45" width="525" height="420" rx="12" class="panel"/>
  <rect x="630" y="45" width="525" height="420" rx="12" class="panel"/>

  <text x="80" y="92" class="label">Top View</text>
  <text x="665" y="92" class="label">Side View</text>
  <text x="80" y="122" class="sub">Measure stator diameter</text>
  <text x="665" y="122" class="sub">Measure stator height</text>

  <!-- Top view -->
  <g transform="translate(0,0)">
    <circle cx="310" cy="275" r="145" class="motor-can"/>
    <circle cx="310" cy="275" r="105" class="stator"/>
    <circle cx="310" cy="275" r="34" class="bearing"/>
    <circle cx="310" cy="275" r="13" class="shaft"/>

    <path d="M310 178 C345 188 372 215 384 250" class="copper"/>
    <path d="M407 275 C397 310 370 337 335 349" class="copper"/>
    <path d="M310 372 C275 362 248 335 236 300" class="copper"/>
    <path d="M213 275 C223 240 250 213 285 201" class="copper"/>

    <line x1="205" y1="425" x2="415" y2="425" class="dim"/>
    <line x1="205" y1="180" x2="205" y2="440" class="guide"/>
    <line x1="415" y1="180" x2="415" y2="440" class="guide"/>
    <text x="248" y="455" class="blue">22 mm diameter</text>
    <text x="235" y="158" class="orange">stator</text>
    <path d="M292 162 L292 202" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="128" y="512" class="small">First two digits of `2207` are the stator diameter.</text>
  </g>

  <!-- Side view -->
  <g transform="translate(0,0)">
    <rect x="770" y="190" width="245" height="170" rx="28" class="motor-can"/>
    <rect x="815" y="232" width="155" height="86" rx="12" class="stator"/>
    <path d="M830 248 H955" class="copper"/>
    <path d="M830 276 H955" class="copper"/>
    <path d="M830 304 H955" class="copper"/>
    <rect x="875" y="115" width="35" height="95" rx="10" class="shaft"/>
    <circle cx="892.5" cy="232" r="26" class="bearing"/>

    <line x1="1035" y1="232" x2="1035" y2="318" class="dim"/>
    <line x1="970" y1="232" x2="1052" y2="232" class="guide"/>
    <line x1="970" y1="318" x2="1052" y2="318" class="guide"/>
    <text x="1055" y="283" class="blue">7 mm height</text>
    <text x="820" y="386" class="orange">stator stack</text>
    <path d="M890 373 L890 318" stroke="#ea580c" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="710" y="512" class="small">Last two digits of `2207` are the stator height.</text>
  </g>

  <rect x="155" y="500" width="890" height="82" rx="12" class="note"/>
  <text x="188" y="535" class="label" font-size="24">Example: 2207 1750KV</text>
  <text x="188" y="565" class="small">`22` = 22 mm stator diameter, `07` = 7 mm stator height, `1750KV` = unloaded RPM per volt.</text>
</svg>
