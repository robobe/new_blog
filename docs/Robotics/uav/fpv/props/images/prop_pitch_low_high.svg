<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Low pitch and high pitch propeller example</title>
  <desc id="desc">Side view diagram comparing low pitch and high pitch FPV drone propellers. Low pitch has a shallow blade angle and moves less air per revolution. High pitch has a steeper blade angle and moves more air per revolution.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
    <style>
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .axis { stroke: #475569; stroke-width: 3; stroke-linecap: round; }
      .blade-low { fill: #bfdbfe; stroke: #2563eb; stroke-width: 3; }
      .blade-high { fill: #fecaca; stroke: #dc2626; stroke-width: 3; }
      .hub { fill: #0f172a; stroke: #020617; stroke-width: 2; }
      .label { fill: #111827; font: 700 30px Arial, sans-serif; }
      .small { fill: #334155; font: 19px Arial, sans-serif; }
      .tiny { fill: #475569; font: 16px Arial, sans-serif; }
      .blue { fill: #2563eb; font: 700 22px Arial, sans-serif; }
      .red { fill: #dc2626; font: 700 22px Arial, sans-serif; }
      .angle-low { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .angle-high { stroke: #dc2626; stroke-width: 4; fill: none; marker-end: url(#arrow-red); }
      .motion { stroke: #111827; stroke-width: 4; fill: none; marker-end: url(#arrow-dark); }
      .air-low { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); stroke-dasharray: 9 8; }
      .air-high { stroke: #dc2626; stroke-width: 4; fill: none; marker-end: url(#arrow-red); stroke-dasharray: 9 8; }
      .note { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>
  <rect x="45" y="45" width="520" height="405" rx="12" class="panel"/>
  <rect x="635" y="45" width="520" height="405" rx="12" class="panel"/>

  <text x="80" y="92" class="label">Low Pitch</text>
  <text x="670" y="92" class="label">High Pitch</text>
  <text x="80" y="122" class="small">Shallow blade angle</text>
  <text x="670" y="122" class="small">Steeper blade angle</text>

  <!-- Low pitch example -->
  <g transform="translate(0,0)">
    <line x1="120" y1="305" x2="490" y2="305" class="axis"/>
    <text x="120" y="336" class="tiny">rotation plane</text>
    <circle cx="305" cy="305" r="22" class="hub"/>
    <path d="M160 290 C215 270 325 275 450 295 C462 297 462 314 450 316 C320 335 215 335 160 320 C145 316 145 295 160 290 Z" class="blade-low"/>
    <path d="M305 305 L460 285" class="motion"/>
    <text x="365" y="264" class="tiny">blade moves this way</text>
    <path d="M410 300 C430 300 448 294 462 282" class="angle-low"/>
    <text x="402" y="365" class="blue">small angle</text>
    <path d="M210 365 C250 390 360 392 410 365" class="air-low"/>
    <text x="205" y="420" class="small">Less air moved per revolution</text>
  </g>

  <!-- High pitch example -->
  <g transform="translate(590,0)">
    <line x1="120" y1="305" x2="490" y2="305" class="axis"/>
    <text x="120" y="336" class="tiny">rotation plane</text>
    <circle cx="305" cy="305" r="22" class="hub"/>
    <path d="M160 260 C220 220 330 235 455 285 C470 291 466 315 449 320 C315 358 215 370 160 350 C140 343 140 274 160 260 Z" class="blade-high"/>
    <path d="M305 305 L450 242" class="motion"/>
    <text x="365" y="222" class="tiny">blade moves this way</text>
    <path d="M405 305 C430 293 448 270 456 242" class="angle-high"/>
    <text x="398" y="365" class="red">large angle</text>
    <path d="M205 378 C250 430 365 430 420 378" class="air-high"/>
    <text x="195" y="420" class="small">More air moved per revolution</text>
  </g>

  <rect x="130" y="485" width="940" height="92" rx="12" class="note"/>
  <text x="160" y="520" class="label" font-size="24">Pitch means forward distance per revolution</text>
  <text x="160" y="552" class="small">A 5x3 prop is designed to advance about 3 inches per revolution in ideal conditions.</text>
  <text x="160" y="574" class="small">A 5x5 prop has a steeper blade and tries to advance about 5 inches per revolution, so it loads the motor harder.</text>
</svg>
