<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">FPV prop mounting for props in and props out</title>
  <desc id="desc">Top view diagram showing clockwise and counter-clockwise propeller placement for props in and props out quadcopter configurations, including front and rear motors and pitch direction.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
    <style>
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .arm { stroke: #334155; stroke-width: 16; stroke-linecap: round; opacity: 0.9; }
      .body { fill: #0f172a; stroke: #020617; stroke-width: 2; }
      .motor { fill: #ffffff; stroke: #0f172a; stroke-width: 4; }
      .hub { fill: #0f172a; }
      .blade-cw { fill: #bfdbfe; stroke: #2563eb; stroke-width: 2; }
      .blade-ccw { fill: #fecaca; stroke: #dc2626; stroke-width: 2; }
      .cw { fill: #2563eb; font: 700 24px Arial, sans-serif; }
      .ccw { fill: #dc2626; font: 700 24px Arial, sans-serif; }
      .label { fill: #111827; font: 700 28px Arial, sans-serif; }
      .small { fill: #334155; font: 18px Arial, sans-serif; }
      .tiny { fill: #475569; font: 15px Arial, sans-serif; }
      .front { fill: #16a34a; font: 700 18px Arial, sans-serif; }
      .note { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
      .flow-in { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .flow-out { stroke: #dc2626; stroke-width: 4; fill: none; marker-end: url(#arrow-red); }
      .pitch { stroke: #111827; stroke-width: 4; fill: none; marker-end: url(#arrow-dark); }
    </style>
  </defs>

  <rect width="1200" height="720" fill="#ffffff"/>
  <rect x="40" y="40" width="535" height="520" rx="12" class="panel"/>
  <rect x="625" y="40" width="535" height="520" rx="12" class="panel"/>

  <text x="70" y="88" class="label">Props In</text>
  <text x="655" y="88" class="label">Props Out</text>
  <text x="70" y="118" class="small">Front prop tips rotate toward the center</text>
  <text x="655" y="118" class="small">Front prop tips rotate away from the center</text>

  <!-- Props in quad -->
  <g transform="translate(0,0)">
    <line x1="205" y1="185" x2="410" y2="390" class="arm"/>
    <line x1="410" y1="185" x2="205" y2="390" class="arm"/>
    <rect x="270" y="250" width="75" height="75" rx="12" class="body"/>
    <path d="M307 235 L307 178" stroke="#16a34a" stroke-width="5" marker-end="url(#arrow-dark)"/>
    <text x="278" y="166" class="front">FRONT</text>

    <!-- FL CW -->
    <g transform="translate(205,185)">
      <ellipse cx="-25" cy="0" rx="58" ry="16" transform="rotate(25)" class="blade-cw"/>
      <ellipse cx="25" cy="0" rx="58" ry="16" transform="rotate(205)" class="blade-cw"/>
      <circle r="40" class="motor"/>
      <circle r="9" class="hub"/>
      <path d="M-22 -56 A62 62 0 0 1 54 -20" class="flow-in"/>
      <text x="-25" y="75" class="cw">CW</text>
      <text x="-68" y="-58" class="tiny">front left</text>
    </g>

    <!-- FR CCW -->
    <g transform="translate(410,185)">
      <ellipse cx="-25" cy="0" rx="58" ry="16" transform="rotate(-25)" class="blade-ccw"/>
      <ellipse cx="25" cy="0" rx="58" ry="16" transform="rotate(155)" class="blade-ccw"/>
      <circle r="40" class="motor"/>
      <circle r="9" class="hub"/>
      <path d="M22 -56 A62 62 0 0 0 -54 -20" class="flow-out"/>
      <text x="-32" y="75" class="ccw">CCW</text>
      <text x="5" y="-58" class="tiny">front right</text>
    </g>

    <!-- RL CCW -->
    <g transform="translate(205,390)">
      <ellipse cx="-25" cy="0" rx="58" ry="16" transform="rotate(-25)" class="blade-ccw"/>
      <ellipse cx="25" cy="0" rx="58" ry="16" transform="rotate(155)" class="blade-ccw"/>
      <circle r="40" class="motor"/>
      <circle r="9" class="hub"/>
      <path d="M22 -56 A62 62 0 0 0 -54 -20" class="flow-out"/>
      <text x="-32" y="75" class="ccw">CCW</text>
      <text x="-62" y="-58" class="tiny">rear left</text>
    </g>

    <!-- RR CW -->
    <g transform="translate(410,390)">
      <ellipse cx="-25" cy="0" rx="58" ry="16" transform="rotate(25)" class="blade-cw"/>
      <ellipse cx="25" cy="0" rx="58" ry="16" transform="rotate(205)" class="blade-cw"/>
      <circle r="40" class="motor"/>
      <circle r="9" class="hub"/>
      <path d="M-22 -56 A62 62 0 0 1 54 -20" class="flow-in"/>
      <text x="-25" y="75" class="cw">CW</text>
      <text x="10" y="-58" class="tiny">rear right</text>
    </g>

  </g>

  <!-- Props out quad -->
  <g transform="translate(585,0)">
    <line x1="205" y1="185" x2="410" y2="390" class="arm"/>
    <line x1="410" y1="185" x2="205" y2="390" class="arm"/>
    <rect x="270" y="250" width="75" height="75" rx="12" class="body"/>
    <path d="M307 235 L307 178" stroke="#16a34a" stroke-width="5" marker-end="url(#arrow-dark)"/>
    <text x="278" y="166" class="front">FRONT</text>

    <!-- FL CCW -->
    <g transform="translate(205,185)">
      <ellipse cx="-25" cy="0" rx="58" ry="16" transform="rotate(-25)" class="blade-ccw"/>
      <ellipse cx="25" cy="0" rx="58" ry="16" transform="rotate(155)" class="blade-ccw"/>
      <circle r="40" class="motor"/>
      <circle r="9" class="hub"/>
      <path d="M22 -56 A62 62 0 0 0 -54 -20" class="flow-out"/>
      <text x="-32" y="75" class="ccw">CCW</text>
      <text x="-68" y="-58" class="tiny">front left</text>
    </g>

    <!-- FR CW -->
    <g transform="translate(410,185)">
      <ellipse cx="-25" cy="0" rx="58" ry="16" transform="rotate(25)" class="blade-cw"/>
      <ellipse cx="25" cy="0" rx="58" ry="16" transform="rotate(205)" class="blade-cw"/>
      <circle r="40" class="motor"/>
      <circle r="9" class="hub"/>
      <path d="M-22 -56 A62 62 0 0 1 54 -20" class="flow-in"/>
      <text x="-25" y="75" class="cw">CW</text>
      <text x="5" y="-58" class="tiny">front right</text>
    </g>

    <!-- RL CW -->
    <g transform="translate(205,390)">
      <ellipse cx="-25" cy="0" rx="58" ry="16" transform="rotate(25)" class="blade-cw"/>
      <ellipse cx="25" cy="0" rx="58" ry="16" transform="rotate(205)" class="blade-cw"/>
      <circle r="40" class="motor"/>
      <circle r="9" class="hub"/>
      <path d="M-22 -56 A62 62 0 0 1 54 -20" class="flow-in"/>
      <text x="-25" y="75" class="cw">CW</text>
      <text x="-62" y="-58" class="tiny">rear left</text>
    </g>

    <!-- RR CCW -->
    <g transform="translate(410,390)">
      <ellipse cx="-25" cy="0" rx="58" ry="16" transform="rotate(-25)" class="blade-ccw"/>
      <ellipse cx="25" cy="0" rx="58" ry="16" transform="rotate(155)" class="blade-ccw"/>
      <circle r="40" class="motor"/>
      <circle r="9" class="hub"/>
      <path d="M22 -56 A62 62 0 0 0 -54 -20" class="flow-out"/>
      <text x="-32" y="75" class="ccw">CCW</text>
      <text x="10" y="-58" class="tiny">rear right</text>
    </g>

  </g>

  <!-- Pitch direction note -->
  <rect x="150" y="595" width="900" height="90" rx="12" class="note"/>
  <text x="178" y="628" class="label" font-size="24">Pitch direction rule</text>
  <path d="M505 648 L610 648" class="pitch"/>
  <path d="M500 662 C540 635 575 635 620 662" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <text x="178" y="662" class="small">Mount each prop so the raised leading edge cuts into the rotation direction.</text>
  <text x="645" y="655" class="small">Rotation direction</text>
  <text x="178" y="680" class="tiny">If the prop is upside down or on the wrong motor, it pushes air the wrong way and the quad can flip on takeoff.</text>
</svg>
